<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Profile - Nanuhm Angels</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <h1 class="logo"><a href="index.html" data-ko="웹사이트 이름" data-en="Website Name">웹사이트 이름</a></h1>
                <nav class="nav">
                    <a href="startups.html" class="nav-link" data-ko="startups" data-en="startups">startups</a>
                    <a href="contact.html" class="nav-link" data-ko="Contact" data-en="Contact">Contact</a>
                    <button id="langToggle" class="lang-btn">한/eng</button>
                </nav>
            </div>
        </div>
    </header>

    <!-- 프로필 섹션 -->
    <main class="profile-page">
        <div class="container">
            <div class="profile-container">
                <!-- 뒤로가기 버튼 -->
                <a href="startups.html" class="back-btn" data-ko="← 목록으로 돌아가기" data-en="← Back to List">← 목록으로 돌아가기</a>

                <!-- 프로필 헤더 -->
                <div class="profile-header">
                    <div class="profile-image-wrapper">
                        <img id="profileImage" src="https://via.placeholder.com/200" alt="Startup Logo" class="profile-image">
                    </div>
                    <div class="profile-title-section">
                        <h1 id="companyName" class="profile-company-name">회사 이름</h1>
                        <div id="profileTags" class="profile-tags">
                            <!-- 태그들 동적 생성 -->
                        </div>
                    </div>
                </div>

                <!-- 프로필 정보 그리드 -->
                <div class="profile-info-grid">
                    <div class="info-card">
                        <h3 data-ko="산업 분야" data-en="Industry">산업 분야</h3>
                        <p id="industry">N/A</p>
                    </div>
                    
                    <div class="info-card">
                        <h3 data-ko="비즈니스 모델" data-en="Primary Business Model">비즈니스 모델</h3>
                        <p id="businessModel">N/A</p>
                    </div>
                    
                    <div class="info-card">
                        <h3 data-ko="스타트업 단계" data-en="Stage of Startup">스타트업 단계</h3>
                        <p id="stage">N/A</p>
                    </div>
                    
                    <div class="info-card">
                        <h3 data-ko="제품 현황" data-en="Current Status of Product">제품 현황</h3>
                        <p id="productStatus">N/A</p>
                    </div>
                </div>

                <!-- 회사 설명 -->
                <div class="profile-description">
                    <h2 data-ko="회사 소개" data-en="Company Description">회사 소개</h2>
                    <p id="companyDescription" data-ko="회사 설명이 여기에 표시됩니다." data-en="Company description will be displayed here.">회사 설명이 여기에 표시됩니다.</p>
                </div>

                <!-- IR Deck 다운로드 -->
                <div class="profile-actions">
                    <a id="irDeckLink" href="#" download class="btn btn-primary btn-large" data-ko="Light IR Deck 보기" data-en="View Light IR Deck">Light IR Deck 보기</a>
                </div>
            </div>
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="container">
            <p data-ko="© 2026 나눔엔젤스. All rights reserved." data-en="© 2026 Nanuhm Angels. All rights reserved.">© 2026 나눔엔젤스. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
