<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startups - Nanuhm Angels</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <h1 class="logo"><a href="index.html" data-ko="웹사이트 이름" data-en="Website Name">웹사이트 이름</a></h1>
                <nav class="nav">
                    <a href="startups.html" class="nav-link active" data-ko="startups" data-en="startups">startups</a>
                    <a href="contact.html" class="nav-link" data-ko="Contact" data-en="Contact">Contact</a>
                    <button id="langToggle" class="lang-btn">한/eng</button>
                </nav>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="startups-page">
        <div class="container-fluid">
            <div class="startups-layout">
                <!-- 필터 사이드바 -->
                <aside class="filter-sidebar">
                    <h2 data-ko="필터" data-en="Filter">필터</h2>
                    
                    <!-- 카테고리 1: Business Model -->
                    <div class="filter-section">
                        <h3 data-ko="비즈니스 모델" data-en="Business Model">비즈니스 모델</h3>
                        <div class="filter-options">
                            <label class="filter-option">
                                <input type="checkbox" name="business-model" value="B2B">
                                <span data-ko="B2B" data-en="B2B">B2B</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="business-model" value="B2C">
                                <span data-ko="B2C" data-en="B2C">B2C</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="business-model" value="B2B2C">
                                <span data-ko="B2B2C" data-en="B2B2C">B2B2C</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="business-model" value="Marketplace">
                                <span data-ko="마켓플레이스" data-en="Marketplace">마켓플레이스</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="business-model" value="SaaS">
                                <span data-ko="SaaS" data-en="SaaS">SaaS</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="business-model" value="Platform">
                                <span data-ko="플랫폼" data-en="Platform">플랫폼</span>
                            </label>
                        </div>
                    </div>

                    <!-- 카테고리 2: Industry -->
                    <div class="filter-section">
                        <h3 data-ko="산업 분야" data-en="Industry">산업 분야</h3>
                        <div class="filter-options">
                            <label class="filter-option">
                                <input type="checkbox" name="industry" value="FinTech">
                                <span data-ko="핀테크" data-en="FinTech">핀테크</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="industry" value="HealthTech">
                                <span data-ko="헬스테크" data-en="HealthTech">헬스테크</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="industry" value="EdTech">
                                <span data-ko="에듀테크" data-en="EdTech">에듀테크</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="industry" value="E-commerce">
                                <span data-ko="이커머스" data-en="E-commerce">이커머스</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="industry" value="AI/ML">
                                <span data-ko="AI/ML" data-en="AI/ML">AI/ML</span>
                            </label>
                        </div>
                    </div>

                    <!-- 카테고리 3: Stage -->
                    <div class="filter-section">
                        <h3 data-ko="단계" data-en="Stage">단계</h3>
                        <div class="filter-options">
                            <label class="filter-option">
                                <input type="checkbox" name="stage" value="Pre-Seed">
                                <span data-ko="프리시드" data-en="Pre-Seed">프리시드</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="stage" value="Seed">
                                <span data-ko="시드" data-en="Seed">시드</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="stage" value="Series A">
                                <span data-ko="시리즈 A" data-en="Series A">시리즈 A</span>
                            </label>
                            <label class="filter-option">
                                <input type="checkbox" name="stage" value="Growth">
                                <span data-ko="성장기" data-en="Growth">성장기</span>
                            </label>
                        </div>
                    </div>

                    <!-- 필터 리셋 버튼 -->
                    <button id="resetFilters" class="btn btn-secondary" data-ko="필터 초기화" data-en="Reset Filters">필터 초기화</button>
                </aside>

                <!-- 스타트업 그리드 -->
                <div class="startups-content">
                    <div id="startupsGrid" class="startups-grid">
                        <!-- 스타트업 카드들 (JavaScript로 동적 생성) -->
                    </div>
                    
                    <!-- 결과 없음 메시지 -->
                    <div id="noResults" class="no-results" style="display: none;">
                        <p data-ko="필터 조건에 맞는 스타트업이 없습니다." data-en="No startups match the filter criteria.">필터 조건에 맞는 스타트업이 없습니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="container">
            <p data-ko="© 2026 나눔엔젤스. All rights reserved." data-en="© 2026 Nanuhm Angels. All rights reserved.">© 2026 나눔엔젤스. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
