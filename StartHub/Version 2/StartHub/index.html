<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanuhm Angels - 스타트업 매칭 플랫폼</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 헤더 네비게이션 -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <h1 class="logo" data-ko="웹사이트 이름" data-en="Website Name">웹사이트 이름</h1>
                <nav class="nav">
                    <a href="startups.html" class="nav-link" data-ko="startups" data-en="startups">startups</a>
                    <a href="contact.html" class="nav-link" data-ko="Contact" data-en="Contact">Contact</a>
                    <button id="langToggle" class="lang-btn">한/eng</button>
                </nav>
            </div>
        </div>
    </header>

    <!-- 메인 섹션 -->
    <main class="main-content">
        <div class="container">
            <!-- About 섹션 -->
            <section class="about-section">
                <h2 class="section-title" data-ko="About" data-en="About">About</h2>
                <p class="about-text" data-ko="나눔엔젤스는 초기 스타트업과 전문 멘토를 연결하여 혁신적인 비즈니스 성장을 지원합니다. 우리 플랫폼을 통해 당신의 스타트업에 맞는 최적의 멘토를 찾아보세요." 
                   data-en="Nanuhm Angels connects early-stage startups with expert mentors to support innovative business growth. Find the perfect mentor for your startup through our platform.">
                   나눔엔젤스는 초기 스타트업과 전문 멘토를 연결하여 혁신적인 비즈니스 성장을 지원합니다. 우리 플랫폼을 통해 당신의 스타트업에 맞는 최적의 멘토를 찾아보세요.
                </p>
            </section>

            <!-- CTA 버튼들 -->
            <div class="cta-container">
                <div class="cta-grid">
                    <div class="cta-card">
                        <h3 data-ko="전시" data-en="Exhibition">전시</h3>
                        <p data-ko="등록된 스타트업 프로필을 확인하세요" data-en="Check registered startup profiles">등록된 스타트업 프로필을 확인하세요</p>
                        <a href="startups.html" class="btn btn-primary" data-ko="스타트업 목록 보기" data-en="View Startups">스타트업 목록 보기</a>
                    </div>
                    
                    <div class="cta-card">
                        <h3 data-ko="지원하기" data-en="Apply">지원하기</h3>
                        <p data-ko="당신의 스타트업을 등록하세요" data-en="Register your startup">당신의 스타트업을 등록하세요</p>
                        <a href="https://forms.gle/BaAt4niHMs6ua3Uh7" target="_blank" class="btn btn-secondary" data-ko="Google Form 작성하기" data-en="Fill Google Form">Google Form 작성하기</a>
                    </div>
                </div>
            </div>

            <!-- 하단 CTA 버튼 -->
            <div class="bottom-cta">
                <a href="startups.html" class="btn btn-large" data-ko="스타트업 페이지로 이동" data-en="Go to Startups Page">스타트업 페이지로 이동</a>
            </div>
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="container">
            <p data-ko="© 2026 나눔엔젤스. All rights reserved." data-en="© 2026 Nanuhm Angels. All rights reserved.">© 2026 나눔엔젤스. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
