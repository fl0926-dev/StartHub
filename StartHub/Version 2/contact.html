<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanuhm — Contact</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="contact">
  <header data-component="site-header"></header>

  <main>
    <div class="container form-narrow">
      <h2 class="page-title" data-i18n="contact.title"></h2>
      <form id="contactForm">
        <div class="form-group">
          <label data-i18n="contact.kind"></label>
          <div class="role-options">
            <label><input type="radio" name="c_kind" value="inquiry" checked> <span data-i18n="contact.kind.inquiry"></span></label>
            <label><input type="radio" name="c_kind" value="bug"> <span data-i18n="contact.kind.bug"></span></label>
          </div>
        </div>
        <div class="form-group">
          <label data-i18n="contact.subject"></label>
          <input type="text" id="c_subject" required>
        </div>
        <div class="form-group">
          <label data-i18n="contact.body"></label>
          <textarea id="c_body" rows="8" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-large" data-i18n="contact.submit"></button>
      </form>
      <p class="form-msg" id="contactMsg" style="display:none" data-i18n="contact.sent"></p>
    </div>
  </main>

  <footer data-component="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
