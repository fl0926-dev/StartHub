<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanuhm — Profile</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="profile">
  <header data-component="site-header"></header>

  <main>
    <div class="container">
      <a class="back-btn" href="startups.html" data-i18n="profile.back"></a>

      <div class="profile-header">
        <div class="profile-image-wrapper">
          <img id="profileImage" alt="">
        </div>
        <div>
          <h1 class="profile-company-name" id="companyName"></h1>
          <div class="profile-tags" id="profileTags"></div>
          <p class="muted"><span data-i18n="profile.views"></span>: <span id="profileViews">0</span></p>
          <div class="profile-actions" id="profileActions" style="margin-top:16px"></div>
        </div>
      </div>

      <div class="info-grid" id="infoGrid"></div>

      <div class="profile-mission">
        <h2 data-i18n="profile.mission"></h2>
        <p id="profileMission"></p>
      </div>

      <a class="btn btn-primary btn-large" id="irDeckLink" href="#" target="_blank" data-i18n="profile.irdeck"></a>

      <section id="profileNews" style="display:none; margin-top:40px">
        <h2 class="page-title" data-i18n="profile.news"></h2>
        <div class="news-feed" id="profileNewsList"></div>
      </section>
    </div>
  </main>

  <footer data-component="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
