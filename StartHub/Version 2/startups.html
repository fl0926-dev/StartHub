<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanuhm — Startups</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="startups">
  <header data-component="site-header"></header>

  <main>
    <div class="container">
      <h2 class="page-title" data-i18n="list.title"></h2>
      <div class="startups-layout">
        <aside class="filter-sidebar" id="filterSidebar"></aside>

        <div class="startups-content">
          <div class="list-toolbar">
            <input class="search-input" id="searchInput" type="search" data-i18n-ph="list.search.placeholder">
            <div class="sort-tabs">
              <button class="sort-tab active" data-sort="recent" data-i18n="list.sort.recent"></button>
              <button class="sort-tab" data-sort="views" data-i18n="list.sort.views"></button>
            </div>
          </div>
          <div class="startups-grid" id="startupsGrid"></div>
          <div class="no-results" id="noResults" style="display:none"><p data-i18n="list.empty"></p></div>
        </div>
      </div>
    </div>
  </main>

  <footer data-component="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
