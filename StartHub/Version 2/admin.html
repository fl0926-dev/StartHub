<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanuhm — Admin</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="admin">
  <header data-component="site-header"></header>

  <main>
    <div class="container">
      <h2 class="page-title" data-i18n="admin.title"></h2>

      <div class="rep-email-row" style="margin-bottom:24px">
        <label data-i18n="admin.repEmail"></label>
        <input type="email" id="repEmail" class="form-input">
        <button class="btn btn-secondary" id="repEmailSave" data-i18n="admin.save"></button>
      </div>

      <div style="display:flex; align-items:center; justify-content:space-between">
        <h3 data-i18n="admin.table"></h3>
        <button class="btn btn-primary" id="exportCsv" data-i18n="admin.export"></button>
      </div>
      <table class="admin-table" id="adminTable"></table>

      <div class="chart-grid">
        <div class="chart-box"><h3 data-i18n="admin.chart.industry"></h3><canvas id="chartIndustry"></canvas></div>
        <div class="chart-box"><h3 data-i18n="admin.chart.timeline"></h3><canvas id="chartTimeline"></canvas></div>
        <div class="chart-box"><h3 data-i18n="admin.chart.views"></h3><canvas id="chartViews"></canvas></div>
      </div>

      <!-- News management -->
      <section class="admin-section">
        <h3 class="page-title" data-i18n="admin.news.title"></h3>
        <form id="newsForm" class="news-form">
          <div class="form-group"><label data-i18n="admin.news.headline"></label><input type="text" id="newsTitle" required></div>
          <div class="form-group"><label data-i18n="admin.news.body"></label><textarea id="newsBody" rows="3"></textarea></div>
          <div class="news-form-row">
            <div class="form-group"><label data-i18n="admin.news.category"></label><select id="newsCategory" class="form-select"></select></div>
            <div class="form-group"><label data-i18n="admin.news.startup"></label><select id="newsStartup" class="form-select"></select></div>
            <div class="form-group"><label data-i18n="admin.news.date"></label><input type="date" id="newsDate"></div>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="admin.news.add"></button>
        </form>
        <table class="admin-table"><tbody id="newsAdminList"></tbody></table>
      </section>

      <!-- User activity analytics -->
      <section class="admin-section">
        <h3 class="page-title" data-i18n="admin.activity.title"></h3>
        <p class="muted" id="activitySummary"></p>
        <table class="admin-table" id="activityTable"></table>
      </section>

      <!-- Inquiries / bug reports -->
      <section class="admin-section">
        <h3 class="page-title" data-i18n="admin.bugs.title"></h3>
        <table class="admin-table" id="bugsTable"></table>
      </section>

      <!-- Team access -->
      <section class="admin-section">
        <h3 class="page-title" data-i18n="admin.team.title"></h3>
        <p class="muted" data-i18n="admin.team.hint"></p>
        <div class="rep-email-row">
          <input type="text" id="teamEmails" class="form-input" style="flex:1">
          <button class="btn btn-secondary" id="teamSave" data-i18n="admin.save"></button>
        </div>
      </section>
    </div>
  </main>

  <footer data-component="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
