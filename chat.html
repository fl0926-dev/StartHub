<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanuhm — Chat</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body data-page="chat">
  <header data-component="site-header"></header>

  <main>
    <div class="container">
      <h2 class="page-title" data-i18n="chat.title"></h2>
      <div class="chat-layout">
        <aside class="conv-list" id="convList"></aside>
        <div class="chat-main">
          <div class="thread" id="thread"></div>
          <form class="chat-form" id="chatForm">
            <input type="text" id="chatInput" data-i18n-ph="chat.placeholder">
            <button class="btn btn-primary" type="submit" data-i18n="chat.send"></button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer data-component="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
